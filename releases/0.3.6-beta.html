    <div id="release-0.3.6-beta-body">
        <div class="TaskBody" role="region" aria-hidden="false" id="aria-release-0.3.6-beta-body">
            <h4>新功能</h4>
<ul>
<li>Feat: 调整删除文件为按路径删除.</li>
<li>Feat: 重构游戏数据和工作目录的数据结构.</li>
</ul>
<h4>修复</h4>
<ul>
<li>Fix: 修复游戏下载成功后自动删除游戏的 bug.</li>
</ul>
<h4>注意事项</h4>
<ul>
<li>Info: 本次升级会导致 0.3.6-beta 之前的游戏无法扫描.</li>
<li>Info: 在任意路径执行 `migrate_data.applescript` 即可.</li>
<li>Info: 终端执行：`osascript migrate_data.applescript`.</li>
<li>Info: 数据转换后,0.3.6-beta 即可正常扫描游戏.</li>
</ul>
        </div>
