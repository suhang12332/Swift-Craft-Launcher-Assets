<p>Feat: 修改Copyright信息.</p>
<p>Feat: 用户设置中新增预选皮肤站的功能(可预先选择皮肤站,防止每次在登录时选).</p>

<h4>修复</h4>
<p>Fix: 修复游戏版本排序问题,修复快照版,预发布版等的版本分组和过滤问题(愚人节版本已经可以正常下载).</p>
