        <div class="TaskBody" role="region" aria-hidden="false" id="aria-release-0.3.5-beta-body">
            <h4>新功能</h4>
<p>Feat: 资源列表、本地资源搜索、远程资源搜索全面支持无限滚动.</p>
<p>Feat: 调整页面状态刷新逻辑.</p>
<p>Feat: 优化临时窗口的代码,统一管理.</p>
<p>Feat: 移除分页机制,改为无限滚动.</p>
<h4>修复</h4>
<p>修复从详情页面返回资源页面时页面混乱的问题.</p>
<p>修复 Java 路径重复检测的问题.</p>
<p>修复 x86 下载 Java 错误的问题.</p>
<p>修复输入框长度过长的问题.</p>
