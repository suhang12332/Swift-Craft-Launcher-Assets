    <div id="release-1.0.6-body">
        <div class="TaskBody" role="region" aria-hidden="false" id="aria-release-1.0.6-body">
            <h4>新功能</h4>
<p>Feat: 拆分大View,大ViewModel,重构部分功能.</p>
<p>Feat: 新增整合包导出预选mod 光影 等文件夹的功能.</p>
<p>Feat: 设置页面新增自动刷新游戏数量.</p>
<p>Feat: 优化错误信息展示.</p>
<p>Feat: 新增cf fingerprint计算方法，用来查询本地资源在cf的详细信息.</p>
<p>Feat: 新增缓存清理按钮(在设置页面的游戏设置处),用于删除旧版本无法扫描的mod-cache,便于使用上面的指纹请求获取详情.</p>
<h4>修复</h4>
<p>Fix: 修复资源切换的时候状态错误的问题.</p>
<p>Fix: 修复整合包下载(导入)的时候,资源类型取值错误的问题</p>
        </div>
