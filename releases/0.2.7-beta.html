        <div class="TaskBody" role="region" aria-hidden="false" id="aria-release-0.2.7-beta-body">
            <h4>新功能</h4>
<p>Feat: 适配ARM低版本支持(1.13 及以上).</p>
<p>Feat: 调整游戏命名和版本排序.</p>
<p>Feat: Java下载支持并发下载.</p>
<p>Feat: 新增Java检测(使用 `java -version` 判断可用性).</p>
<p>Feat: 新增3D皮肤预览和披风预览(@irisWirisW).</p>
<h4>修复</h4>
<p>Fix: 修复版本选择丢失问题(#17).</p>
<p>Fix: 修复皮肤头像渲染时 Metal 着色器缓存冲突问题.</p>
<p>Fix: 对于某些CurseForge整合包没有version的情况,为其新增version字段.</p>
