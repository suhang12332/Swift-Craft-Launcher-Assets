    <div id="release-0.4.7-beta-body">
        <div class="TaskBody" role="region" aria-hidden="false" id="aria-release-0.4.7-beta-body">
            <h4>新功能</h4>
<p>Feat: 重构 AI 设置,改为通用 OpenAI 接口,可自行设置其他三方 AI 提供商(OpenAI 接口格式),详见 issue #150.</p>
<p>Feat: 去除 License 窗口,改为跳转网页.</p>
<p>Feat: 优化资源下载窗口的交互逻辑.</p>
<p>Feat: 新增快照版下载,并支持过滤已禁用的资源(慎用,快照版版本很多).</p>
<p>Feat: 移除崩溃检测.</p>
<p>Feat: 侧边栏使用 SF Symbols 图标.</p>
<p>Feat: 优化访问 Keychain 玩家信息为按需读取.</p>
<h4>修复</h4>
<p>Fix: 修复正版账户刷新不生效的问题,新增 loading 状态显示刷新进度.</p>
