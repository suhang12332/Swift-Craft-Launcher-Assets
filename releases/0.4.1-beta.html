            <h4>新功能</h4>
<p>Feat: 新增整合包导出功能(Modrinth 格式).</p>
<p>Feat: 新增资源(Mod 等)更新功能.</p>
<p>Feat: 限制 saveinfo 中每个 chip 的最大宽度.</p>
<p>Feat: 优化按钮刷新机制.</p>
<p>Feat: 优化 Mod 资源更新流程.</p>
<p>Feat: 重构 `GameDetail` 中的资源管理逻辑.</p>
<p>Feat: 调整菜单栏代码结构.</p>
<p>Feat: 单个资源使用下载弹窗而非静默下载.</p>
<p>Feat: 调整整合包下载为圆形进度条.</p>
<p>Feat: 将禁用按钮改为 Toggle 控件.</p>
