        <div class="TaskBody" role="region" aria-hidden="false" id="aria-release-0.4.3-beta-body">
            <h3>新功能</h3>
<ul>
<li>Feat: 新增基于easytier的联机(Scaffolding-MC协议可以和pcl,hmcl等跨启动器联机) 不是很稳定,但也基本可用</li>
<li>Feat：新增在游戏高级设置中选择使用自定义的java路径,同时支持恢复默认</li>
<li>Feat：移除可以给dock选择多个图标的功能(图片太占启动器大小)</li>
<li>Feat：新增支持麦克风权限(用于语音聊天mod)</li>
<li>Feat：调整整合包导出使用fileexporter</li>
</ul>
<h3>修复</h3>
<ul>
<li>Fix: 修复导出整合包时候sheet为空的问题</li>
<li>Fix: 修复设置页面错误显示无法使用国际化的问题</li>
</ul>
