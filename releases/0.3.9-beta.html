    <div id="release-0.3.9-beta-body">
        <div class="TaskBody" role="region" aria-hidden="false" id="aria-release-0.3.9-beta-body">
            <h4>新功能</h4>
<ul>
<li>Feat: 新增存档解析、投影解析、服务器管理、截图预览、日志查看等功能.</li>
<li>Feat: 将 Mod 扫描流程移动到游戏加载后执行,提升启动体验.</li>
<li>Feat: 优化整体游戏加载逻辑.</li>
<li>Feat: 解决切换游戏后内容不刷新的问题.</li>
<li>Feat: 调整皮肤在第二层为空时显示缩小一圈的问题.</li>
<li>Feat: 调整整合包安装和导入时的复制文件优先级为最开始执行.</li>
</ul>
<h4>修复</h4>
<ul>
<li>Fix: 修复原版游戏从资源界面切换到游戏时,无法找到资源目录的问题.</li>
<li>Fix: 修复侧边栏图标闪烁的问题.</li>
</ul>
