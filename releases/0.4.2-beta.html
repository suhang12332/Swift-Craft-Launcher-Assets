            <h4>新功能</h4>
<ul>
<li>Feat: 新增 IP 检测.</li>
<li>Feat: 新增可以选择不同的 Dock 栏图标.</li>
<li>Feat: 调整安装主资源为先 loading 再弹窗.</li>
<li>Feat: 新增禁用时资源置灰效果.</li>
<li>Feat: 调整游戏模式下资源安装逻辑,与全局资源安装逻辑保持一致.</li>
</ul>
<h4>修复</h4>
<ul>
<li>Fix: 修复从 Mod 切换到游戏时搜索文本不清空的问题.</li>
<li>Fix: 修复本地搜索出现重复结果的问题.</li>
</ul>
