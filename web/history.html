<!DOCTYPE html>
<html lang="zh-Hans" class="dark-mode-enabled">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="light dark" name="color-scheme">
    <meta name="releases-base" content="https://raw.githubusercontent.com/suhang12332/Swift-Craft-Launcher-Assets/main/releases-notes/">
    <title>Swift Craft Launcher - 版本历史</title>
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/suhang12332/Swift-Craft-Launcher/main/SwiftCraftLauncher/Assets.xcassets/AppIcon.appiconset/mac128pt1x.png">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/layout.css">
    <script src="js/language.js"></script>
    <script src="js/releases.js" defer></script>
</head>

<body dir="ltr" class="AppleTopic apd-topic dark-mode-enabled" data-istaskopen="false" data-designversion="2">
    <!-- Header（保持与首页一致） -->
    <header class="Hero">
        <nav>
            <h1>Swift Craft Launcher</h1>
            <div class="nav-links">
                <a href="../help/SwiftCraftLauncher.help/Contents/Resources/zh-Hans.lproj/index.html" class="docs-link"
                    target="_blank" rel="noopener noreferrer">文档</a>
                <a href="history.html" class="docs-link is-active" aria-current="page">版本历史</a>
                <a href="https://github.com/suhang12332/Swift-Craft-Launcher/" class="github-link" aria-label="GitHub"
                    target="_blank" rel="noopener noreferrer">
                    <img src="assets/github-mark.svg" alt="GitHub" class="github-icon github-icon-light">
                    <img src="assets/github-mark-white.svg" alt="GitHub" class="github-icon github-icon-dark">
                </a>
                <select class="language-selector" id="languageSelector">
                    <option value="en/history.html">English</option>
                    <option value="history.html" selected>简体中文</option>
                    <option value="zh-Hant/history.html">繁體中文</option>
                </select>
            </div>
        </nav>
    </header>

    <!-- Body（内容区使用 Help 风格的 Task 折叠列表） -->
    <main>
        <div class="history-two-col">
            <aside class="history-sidebar" aria-label="版本列表">
                <ul class="toc-list" id="releaseToc">
                    <li><p>加载中…</p></li>
                </ul>
            </aside>

            <section class="history-detail" aria-label="版本详情">
                <div class="HIStrings">
                    <p class="history-title-row">
                        <a id="releaseTitleLink" href="#" target="_blank">
                            <strong id="releaseTitle">—</strong>
                        </a>
                        <a class="back-to-index" href="index.html">返回首页</a>
                    </p>
                </div>
                <div id="releaseContent" class="history-content" aria-busy="false"></div>
                <div id="releaseTasks" class="history-mobile-tasks"></div>
            </section>
        </div>
    </main>
</body>

</html>
