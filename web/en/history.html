<!doctype html>
<html lang="en" class="dark-mode-enabled">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta content="light dark" name="color-scheme" />
        <meta
            name="releases-base"
            content="https://suhang12332.github.io/Swift-Craft-Launcher-Assets/releases-notes/"
        />
        <title>Swift Craft Launcher - Changelog</title>
        <link
            rel="icon"
            type="image/png"
            href="https://raw.githubusercontent.com/suhang12332/Swift-Craft-Launcher/main/SwiftCraftLauncher/Assets.xcassets/AppIcon.appiconset/mac128pt1x.png"
        />
        <link rel="stylesheet" href="../css/app.css" />
        <link rel="stylesheet" href="../css/layout.css" />
        <script src="../js/language.js"></script>
        <script src="../js/releases.js" defer></script>
    </head>

    <body
        dir="ltr"
        class="AppleTopic apd-topic dark-mode-enabled"
        data-istaskopen="false"
        data-designversion="2"
    >
        <!-- Header（keep identical to home） -->
        <header class="Hero">
            <nav>
                <h1>Swift Craft Launcher</h1>
                <div class="nav-links">
                    <a
                        href="https://doc.scl.isiah.top/en.lproj/"
                        class="docs-link"
                        target="_blank"
                        rel="noopener noreferrer"
                        >Docs</a
                    >
                    <a
                        href="history.html"
                        class="docs-link is-active"
                        aria-current="page"
                        >Changelog</a
                    >
                    <a
                        href="https://github.com/suhang12332/Swift-Craft-Launcher/"
                        class="github-link"
                        aria-label="GitHub"
                        target="_blank"
                        rel="noopener noreferrer"
                        >GitHub</a
                    >
                </div>
            </nav>
        </header>

        <!-- Body（Help-style Task list content） -->
        <main>
            <div class="history-two-col">
                <aside class="history-sidebar" aria-label="Versions">
                    <ul class="toc-list" id="releaseToc">
                        <li class="history-loading-item">
                            <div
                                class="history-loading"
                                role="status"
                                aria-live="polite"
                            >
                                <span
                                    class="mac-spinner"
                                    aria-hidden="true"
                                ></span>
                                <span class="history-loading-label"
                                    >Loading release history…</span
                                >
                            </div>
                        </li>
                    </ul>
                </aside>

                <section class="history-detail" aria-label="Release details">
                    <div class="HIStrings">
                        <p class="history-title-row">
                            <span class="history-release-heading">
                                <a id="releaseTitleLink" href="#" target="_blank">
                                    <strong id="releaseTitle">—</strong>
                                </a>
                                <span
                                    id="releaseDownloadCount"
                                    class="release-download-count"
                                    hidden
                                ></span>
                            </span>
                            <a class="back-to-index" href="../index.html"
                                >Back to Home</a
                            >
                        </p>
                    </div>
                    <div
                        id="releaseContent"
                        class="history-content"
                        aria-busy="false"
                    ></div>
                    <div id="releaseTasks" class="history-mobile-tasks"></div>
                </section>
            </div>
        </main>
    </body>
</html>
